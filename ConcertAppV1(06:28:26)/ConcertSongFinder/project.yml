name: ConcertSongFinder
options:
  bundleIdPrefix: com.example
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
packages:
  ConcertSongFinderCore:
    path: .
settings:
  base:
    SWIFT_VERSION: "5.0"
targets:
  ConcertSongFinder:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: ConcertSongFinder
        excludes:
          - Resources/Info.plist
    resources:
      - path: ConcertSongFinder/Resources
    info:
      path: ConcertSongFinder/Resources/Info.plist
    dependencies:
      - package: ConcertSongFinderCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.ConcertSongFinder
        PRODUCT_NAME: ConcertSongFinder
        INFOPLIST_FILE: ConcertSongFinder/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_USER_SCRIPT_SANDBOXING: "YES"
  ConcertSongFinderCoreTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Tests/ConcertSongFinderCoreTests
    dependencies:
      - package: ConcertSongFinderCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.ConcertSongFinderCoreTests
        GENERATE_INFOPLIST_FILE: "YES"
schemes:
  ConcertSongFinder:
    build:
      targets:
        ConcertSongFinder: all
        ConcertSongFinderCoreTests: [test]
    test:
      targets:
        - ConcertSongFinderCoreTests
