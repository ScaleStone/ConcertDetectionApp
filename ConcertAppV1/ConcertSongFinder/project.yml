name: ConcertSongFinder
options:
  bundleIdPrefix: com.example
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
packages:
  ConcertSongFinderCore:
    path: .
settings:
  base:
    SWIFT_VERSION: "5.0"
targets:
  ConcertSongFinder:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: ConcertSongFinder
        excludes:
          - Resources/Info.plist
    resources:
      - path: ConcertSongFinder/Resources
    info:
      path: ConcertSongFinder/Resources/Info.plist
      properties:
        CSFBackendBaseURL: "https://concertsongfinder-backend.onrender.com"
        CSFBackendAPIKey: "-XoOTG1JM5fdy_n_y3jXATofsjrL4NH2paUUwhNiktI"
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        NSLocalNetworkUsageDescription: "ConcertSongFinder connects to the local backend running on this Mac during development."
        NSSpeechRecognitionUsageDescription: "This app uses speech recognition to transcribe spoken audio from your videos so it can identify concert details."
        NSMicrophoneUsageDescription: "This app may use microphone audio access when preparing audio for speech recognition."
        NSPhotoLibraryUsageDescription: "This app reads creation dates from your selected photos and videos to organize them into concerts."
    dependencies:
      - package: ConcertSongFinderCore
    settings:
      base:
        # "AppConcert" is the App ID this app runs under for ShazamKit;
        # reverting it to a placeholder breaks Shazam recognition with
        # 401 "Missing entitlements". Do not change without re-testing Shazam.
        PRODUCT_BUNDLE_IDENTIFIER: AppConcert
        PRODUCT_NAME: ConcertSongFinder
        INFOPLIST_FILE: ConcertSongFinder/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_USER_SCRIPT_SANDBOXING: "YES"
  ConcertSongFinderCoreTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Tests/ConcertSongFinderCoreTests
    dependencies:
      - package: ConcertSongFinderCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.ConcertSongFinderCoreTests
        GENERATE_INFOPLIST_FILE: "YES"
schemes:
  ConcertSongFinder:
    build:
      targets:
        ConcertSongFinder: all
        ConcertSongFinderCoreTests: [test]
    test:
      targets:
        - ConcertSongFinderCoreTests
